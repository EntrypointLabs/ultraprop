name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ts:
    name: TypeScript & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The app and services resolve the shared packages by their built `dist`
      # (types + js), so compile those before anything that imports them.
      - name: Build shared packages
        run: >-
          pnpm
          --filter @shared/sim-core
          --filter @shared/sui-propfirm
          --filter @shared/db
          --filter @shared/venues
          build

      - name: Typecheck
        run: >-
          pnpm
          --filter @app/trader
          --filter @service/executor
          --filter @service/api-gateway
          --filter @shared/db
          typecheck

      - name: Test
        run: >-
          pnpm
          --filter @app/trader
          --filter @shared/db
          --filter @service/executor
          test

  move:
    name: Move tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The bare `testnet` tag has no downloadable release asset (Sui tags real
      # releases `testnet-vX.Y.Z`), so resolve the LATEST testnet release and grab
      # its ubuntu archive via the API. If `sui move test` ever fails on a
      # framework mismatch, pin a specific `testnet-vX.Y.Z` tag here instead.
      - name: Install Sui CLI (latest testnet release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          url=$(gh api 'repos/MystenLabs/sui/releases?per_page=100' \
            --jq 'map(select(.tag_name | startswith("testnet-")))[0].assets[]
                  | select(.name | test("ubuntu-x86_64.tgz$")) | .browser_download_url' \
            | head -1)
          if [ -z "$url" ]; then echo "no testnet ubuntu asset found"; exit 1; fi
          echo "Downloading $url"
          curl -fsSL "$url" -o sui.tgz
          mkdir -p "$HOME/.sui/bin"
          tar -xzf sui.tgz -C "$HOME/.sui/bin"
          sui_bin="$(find "$HOME/.sui/bin" -name sui -type f | head -1)"
          chmod +x "$sui_bin"
          echo "$(dirname "$sui_bin")" >> "$GITHUB_PATH"

      - name: Sui version
        run: sui --version

      - name: Move tests (propfirm)
        working-directory: contracts/sui
        run: sui move test

      - name: Move tests (mock-usdc)
        working-directory: contracts/mock-usdc
        run: sui move test
